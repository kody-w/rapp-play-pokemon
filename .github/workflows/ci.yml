name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies only
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Compile
        run: python -m compileall -q agent.py src tests scripts
      - name: Shell syntax
        run: bash -n bootstrap.sh launch.sh uninstall.sh
      - name: ROM-free, GUI-free, Copilot-free tests
        run: pytest
      - name: Build package
        run: python -m build
      - name: Reject public artifacts and credentials
        run: python scripts/check_public_artifacts.py

  canonical-rapp-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAPP_REF: 32f1932f4213ed92dd867325b410f59be535ba19
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test and canonical brainstem dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install -r requirements-rapp.txt
      - name: Resolve pinned public canonical RAPP
        run: |
          git clone --filter=blob:none --no-checkout \
            https://github.com/kody-w/RAPP.git .rapp-ci
          git -C .rapp-ci sparse-checkout init --cone
          git -C .rapp-ci sparse-checkout set \
            cave/rapplications/rapp-installer/kernel
          git -C .rapp-ci fetch --depth 1 origin "$RAPP_REF"
          git -C .rapp-ci checkout --detach FETCH_HEAD
          test "$(git -C .rapp-ci rev-parse HEAD)" = "$RAPP_REF"
      - name: Canonical discovery and invocation smoke
        env:
          RAPP_BRAINSTEM_DIR: ${{ github.workspace }}/.rapp-ci/cave/rapplications/rapp-installer/kernel
        run: |
          mkdir -m 700 .work-smoke
          python -m rapp_play_pokemon.brainstem \
            --source agent.py \
            --brainstem-dir "$RAPP_BRAINSTEM_DIR" \
            --smoke-runtime-dir .work-smoke
          rm -rf .work-smoke
